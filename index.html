<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LENLORCRAFT</title>

<!-- FONTS -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gabarito:wght@400;500;600;700;900&family=Bai+Jamjuree:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">

<style>
/* ============================
   RESET & ROOT
============================ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --orange:   #FF8952;
  --orange2:  #D96B3D;
  --black:    #000000;
  --dark:     #0d0905;
  --dark2:    #181008;
  --border:   #2c1c0a;
  --cream:    #ecdfc8;
  --muted:    #806050;
  --EN: 'Gabarito', sans-serif;
  --TH: 'Bai Jamjuree', sans-serif;
}

html, body { height:100%; }

body {
  background: var(--dark);
  color: var(--cream);
  font-family: var(--EN);
  overflow-x: hidden;
}

/* ============================
   NAV / HEADER
============================ */
#header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 900;
  height: 54px;
  background: #000000;
  border-bottom: 1px solid #1a1008;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 28px;
  padding: 0 28px;
}

.nav-group {
  display: flex;
  align-items: center;
  gap: 24px;
}

.nav-btn {
  background: none;
  border: none;
  color: var(--cream);
  font-family: var(--EN);
  font-size: 15px;
  font-weight: 700;
  letter-spacing: .14em;
  text-transform: uppercase;
  cursor: pointer;
  padding: 0;
  transition: color .2s;
}
.nav-btn:hover { color: var(--orange); }

.nav-social {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-left: 6px;
}
.nav-social a {
  color: var(--orange);
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: opacity .2s, transform .2s;
}
.nav-social a:hover { opacity: .75; transform: translateY(-1px); }
.nav-social svg { display: block; width: 18px; height: 18px; fill: currentColor; }
.nav-social a.yt svg { width: 22px; height: 22px; }
.nav-social a.dc svg { width: 20px; height: 20px; }

/* Mobile hamburger button (hidden on desktop) */
.hamburger-btn {
  display: none;
  position: absolute;
  right: 18px;
  top: 50%;
  transform: translateY(-50%);
  width: 36px;
  height: 36px;
  background: none;
  border: 1px solid var(--orange);
  cursor: pointer;
  padding: 0;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
}
.hamburger-btn span {
  display: block;
  width: 16px;
  height: 2px;
  background: var(--orange);
  transition: transform .25s, opacity .25s;
}
.hamburger-btn.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
.hamburger-btn.open span:nth-child(2) { opacity: 0; }
.hamburger-btn.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

.mobile-menu {
  display: none;
  position: fixed;
  top: 54px;
  left: 0;
  right: 0;
  background: #000;
  border-top: 1px solid var(--orange);
  border-bottom: 1px solid var(--orange);
  z-index: 899;
  max-height: calc(100vh - 54px);
  overflow-y: auto;
}
.mobile-menu.open { display: block; }
.mobile-menu button {
  display: block;
  width: 100%;
  padding: 16px 22px;
  background: none;
  border: none;
  border-bottom: 1px solid var(--border);
  color: var(--cream);
  font-family: var(--EN);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: .18em;
  text-transform: uppercase;
  text-align: left;
  cursor: pointer;
  transition: background .2s, color .2s;
}
.mobile-menu button:hover,
.mobile-menu button:active {
  background: #1a1108;
  color: var(--orange);
}

.nav-logo {
  display: flex;
  justify-content: center;
  align-items: center;
}
.nav-logo img {
  height: 46px;
  cursor: pointer;
  transition: opacity .2s;
}
.nav-logo img:hover { opacity: .8; }

/* ============================
   PAGE SWITCHER
============================ */
.page { display: none; }
.page.active { display: block; }

/* ============================
   INLINE PROJECT EXPAND
   Slides down beneath the projects row when a project card is clicked.
============================ */
.proj-expand {
  overflow: hidden;
  max-height: 0;
  transition: max-height .65s cubic-bezier(.2,.7,.2,1);
  background: radial-gradient(ellipse at 50% 0%, #2a1808 0%, #100a04 60%, #060402 100%);
}
.proj-expand.open {
  max-height: 1600px;
}
.proj-expand-inner {
  position: relative;
  padding: 40px 24px 56px;
  opacity: 0;
}
.proj-expand.open .proj-expand-inner { opacity: 1; transition: opacity .35s ease .1s; }

@keyframes innerSlideIn {
  from { opacity: 0; transform: translateY(-26px); }
  to   { opacity: 1; transform: translateY(0); }
}
.proj-expand-inner.slide-in {
  animation: innerSlideIn .55s cubic-bezier(.2,.7,.2,1);
}

.proj-expand-close {
  position: absolute;
  top: 16px; right: 20px;
  background: none;
  border: 1px solid var(--orange);
  color: var(--orange);
  width: 34px; height: 34px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 700;
  font-family: var(--EN);
  transition: background .2s, color .2s, transform .2s;
  z-index: 10;
}
.proj-expand-close:hover {
  background: var(--orange);
  color: var(--dark);
  transform: rotate(90deg);
}

.proj-card.active {
  border-color: var(--orange);
  box-shadow: 0 0 0 1px var(--orange), 0 10px 24px -10px rgba(200,102,42,.6);
  transform: translateY(-8px);
}

/* ============================
   HOME — HERO
   정확히 reference와 같이: 순수한 오렌지 배경
============================ */
#hero {
  height: calc(100vh - 54px);
  margin-top: 54px;
  background: var(--orange);
  position: relative;
  overflow: hidden;
}
/* Optional: drop in a real bg image later with class .has-bg */
#hero.has-bg::after {
  content: '';
  position: absolute; inset: 0;
  background: rgba(0,0,0,.35);
}
#hero img.hero-img {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}

/* ============================
   HOME — PROJECTS SECTION
============================ */
#projects-section {
  background: var(--dark);
  padding: 64px 40px 48px;
}

.section-eyebrow {
  text-align: center;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .4em;
  color: var(--orange);
  text-transform: uppercase;
  margin-bottom: 32px;
}

.projects-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  max-width: 900px;
  margin: 0 auto;
}

.proj-card {
  aspect-ratio: 1/1;
  background: var(--dark2);
  border: 1px solid var(--border);
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: border-color .3s, transform .35s;
}
.proj-card:hover {
  border-color: var(--orange);
  transform: translateY(-8px);
}

.proj-card-fill {
  position: absolute; inset: 0;
  background: linear-gradient(150deg, #2a1508 0%, #0d0905 100%);
}
.proj-card-logo {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
  z-index: 1;
  transition: transform .45s ease;
}
.proj-card:hover .proj-card-logo {
  transform: scale(1.06);
}
.proj-card-gradient {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,.85) 0%, rgba(0,0,0,.2) 45%, transparent 70%);
  z-index: 2;
}
.proj-card-body { z-index: 3; }
.proj-card-arrow { z-index: 4; }
.proj-card-body {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 14px 12px;
}
.proj-card-num {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .35em;
  color: var(--orange);
  margin-bottom: 4px;
}
.proj-card-name {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: .05em;
  line-height: 1.25;
}
.proj-card-arrow {
  position: absolute;
  top: 10px; right: 10px;
  width: 26px; height: 26px;
  border: 1px solid var(--orange);
  color: var(--orange);
  font-size: 11px;
  display: flex; align-items: center; justify-content: center;
  opacity: 0;
  transform: translate(6px,-6px);
  transition: opacity .25s, transform .25s;
}
.proj-card:hover .proj-card-arrow { opacity: 1; transform: translate(0,0); }

/* ============================
   HOME — TEAM SECTION
============================ */
#team-section {
  background: var(--dark2);
  padding: 64px 40px 64px;
}

.team-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  max-width: 1000px;
  margin: 0 auto;
}

.team-card {
  display: flex;
  align-items: center;
  gap: 14px;
  background: var(--dark);
  border: 1px solid var(--border);
  padding: 10px;
  text-decoration: none;
  color: var(--cream);
  transition: border-color .25s, transform .25s, background .25s;
}
.team-card:hover {
  border-color: var(--orange);
  background: #1a1108;
  transform: translateY(-3px);
}
.team-card-img {
  width: 76px;
  height: 76px;
  flex-shrink: 0;
  overflow: hidden;
  background: var(--dark2);
  border: 1px solid var(--border);
}
.team-card-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: top center;
  display: block;
}
.team-card-body {
  flex: 1;
  min-width: 0;
}
.team-card-channel {
  font-family: var(--EN);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: .03em;
  color: var(--cream);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 4px;
}
.team-card:hover .team-card-channel { color: var(--orange); }
.team-card-meta {
  font-family: var(--TH);
  font-size: 11px;
  color: var(--muted);
  line-height: 1.35;
  display: flex;
  flex-wrap: wrap;
  align-items: baseline;
  gap: 4px 6px;
}
.team-card-meta .dot { color: var(--orange); }
.team-card-meta .char { color: var(--cream); }

/* ============================
   MUSIC PLAYER (fixed bottom-right, above now-on-air bar)
============================ */
#music-player {
  position: fixed;
  bottom: 72px;
  right: 20px;
  z-index: 800;
  width: 280px;
  padding: 14px 18px 14px;
  background: rgba(13,9,5,.92);
  -webkit-backdrop-filter: blur(8px);
  backdrop-filter: blur(8px);
  border: 1px solid var(--orange);
  color: var(--cream);
  font-family: var(--EN);
  box-shadow: 0 10px 28px rgba(0,0,0,.55);
  transition: opacity .25s, transform .25s;
}
#music-player.hidden { opacity: 0; pointer-events: none; transform: translateY(8px); }

.mp-label {
  font-size: 8px;
  font-weight: 700;
  letter-spacing: .35em;
  color: var(--orange);
  margin-bottom: 6px;
  text-transform: uppercase;
}
.mp-title {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: .03em;
  line-height: 1.3;
  margin-bottom: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.mp-artist {
  font-size: 9px;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: .22em;
  margin-bottom: 10px;
  text-transform: uppercase;
}
.mp-controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}
.mp-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--cream);
  width: 32px;
  height: 32px;
  cursor: pointer;
  font-family: var(--EN);
  font-size: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .2s, color .2s, border-color .2s;
  padding: 0;
  line-height: 1;
}
.mp-btn:hover {
  background: var(--orange);
  color: var(--dark);
  border-color: var(--orange);
}
.mp-btn-play {
  width: 40px;
  height: 40px;
  border-color: var(--orange);
  color: var(--orange);
  font-size: 14px;
}
.mp-volume {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 12px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
}
.mp-vol-icon {
  font-size: 13px;
  cursor: pointer;
  user-select: none;
  color: var(--orange);
  flex-shrink: 0;
  width: 18px;
  text-align: center;
  transition: opacity .2s;
}
.mp-vol-icon:hover { opacity: .65; }
.mp-vol-slider {
  flex: 1;
  -webkit-appearance: none;
  appearance: none;
  height: 3px;
  background: var(--border);
  outline: none;
  cursor: pointer;
  border-radius: 2px;
}
.mp-vol-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 12px;
  height: 12px;
  background: var(--orange);
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid var(--dark);
  box-shadow: 0 0 0 1px var(--orange);
}
.mp-vol-slider::-moz-range-thumb {
  width: 12px;
  height: 12px;
  background: var(--orange);
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid var(--dark);
  box-shadow: 0 0 0 1px var(--orange);
}
.mp-vol-value {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .04em;
  color: var(--muted);
  min-width: 26px;
  text-align: right;
  flex-shrink: 0;
  font-variant-numeric: tabular-nums;
}
.mp-btn svg {
  width: 14px;
  height: 14px;
  fill: currentColor;
  display: block;
}
.mp-btn-play svg { width: 16px; height: 16px; }
.mp-vol-icon svg {
  width: 16px;
  height: 16px;
  fill: currentColor;
  display: block;
  margin: 0 auto;
}
.mp-close {
  position: absolute;
  top: 8px;
  right: 8px;
  width: 22px;
  height: 22px;
  background: none;
  border: none;
  color: var(--muted);
  font-size: 14px;
  cursor: pointer;
  padding: 0;
  transition: color .2s;
}
.mp-close:hover { color: var(--orange); }

/* ============================
   NOW ON AIR BAR
   Reference: ด้านล่าง fixed
   LEFT: thumb + "NOW ON AIR | NAME"
   RIGHT: tab boxes 01 02 03 04
============================ */
#now-on-air {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 900;
  height: 56px;
  background: #000000;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 28px;
  padding: 8px 28px;
}

.air-label {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 14px;
  border: 1px solid var(--orange);
  height: 40px;
  overflow: hidden;
}
.air-thumb {
  width: 28px;
  height: 28px;
  object-fit: cover;
  flex-shrink: 0;
  border: 1px solid var(--border);
}
.air-text {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .18em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--orange);
}
.air-text em {
  font-style: normal;
  color: var(--orange);
}

/* Tabs */
.air-tabs {
  display: flex;
  align-items: center;
  gap: 8px;
}

.air-tab {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0;
  border: 1px solid var(--orange);
  padding: 0 12px;
  cursor: pointer;
  font-family: var(--EN);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: .1em;
  color: var(--orange);
  background: none;
  text-transform: uppercase;
  transition: color .2s, background .2s;
  white-space: nowrap;
  min-width: 44px;
  height: 40px;
}
.air-tab:hover { color: var(--dark); background: var(--orange); }

.air-tab-name {
  font-size: 9px;
  letter-spacing: .1em;
  overflow: hidden;
  max-width: 0;
  opacity: 0;
  transition: max-width .4s ease, opacity .3s, margin .4s;
  color: var(--dark);
}

.air-tab.active {
  background: var(--orange);
  color: var(--dark);
}
.air-tab.active .air-tab-name {
  max-width: 200px;
  opacity: 1;
  margin-left: 8px;
}

/* ============================
   PROJECT DETAIL PAGE
   Reference image 2
============================ */
.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin: 20px 32px;
  background: none;
  border: none;
  color: var(--orange);
  font-family: var(--EN);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .22em;
  text-transform: uppercase;
  cursor: pointer;
  transition: opacity .2s;
}
.back-btn:hover { opacity: .6; }

/* Project logo / title block — reference shows ornate centered logo */
.proj-detail-header {
  text-align: center;
  padding: 30px 20px 36px;
}
.proj-detail-logo {
  display: block;
  max-width: 480px;
  max-height: 260px;
  width: auto;
  height: auto;
  margin: 0 auto 14px;
  object-fit: contain;
  filter: drop-shadow(0 6px 20px rgba(0,0,0,.6));
}
.proj-detail-eyebrow {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .4em;
  color: var(--orange);
  margin-bottom: 10px;
}
.proj-detail-title {
  font-size: clamp(22px, 3vw, 38px);
  font-weight: 900;
  letter-spacing: .14em;
  line-height: 1.1;
  margin-bottom: 6px;
}
.proj-detail-sub {
  font-family: var(--TH);
  font-size: 14px;
  font-weight: 300;
  color: var(--orange);
  letter-spacing: .06em;
}

/* ─── DIAGONAL CHARACTER CARDS ───
   Reference: parallelogram tilted ~-13deg
   3 rows × 8 cards, first row has real images, rest empty (orange)
   Cards overlap slightly, tight gap
──────────────────────────────────── */
.char-section {
  padding: 0 24px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  align-items: center;
  overflow: hidden;
}

.char-row {
  display: flex;
  gap: 5px;
  justify-content: center;
}

/* The parallelogram wrapper */
.c-card {
  width: 88px;
  height: 158px;
  flex-shrink: 0;
  transform: skewX(-13deg);
  overflow: hidden;
  cursor: pointer;
  position: relative;
  background: var(--orange);
  transition: transform .3s cubic-bezier(.4,0,.2,1), filter .3s;
}
.c-card:hover {
  transform: skewX(-13deg) translateY(-14px);
  filter: brightness(1.2);
  z-index: 5;
}

/* Counter-skew so image stays upright */
.c-card img {
  position: absolute;
  top: 0; left: -14%;
  width: 128%;
  height: 100%;
  object-fit: cover;
  object-position: top center;
  transform: skewX(13deg);
  display: block;
}

/* Empty / locked slot */
.c-card.empty {
  background: var(--orange);
  opacity: .6;
  cursor: default;
}
.c-card.empty:hover {
  transform: skewX(-13deg);
  filter: none;
}
.c-card.empty img {
  opacity: .2;
}

/* Pagination dots (for projects with > 1 page, e.g. Nemorphine) */
.char-pagination {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-top: 28px;
  padding: 0 24px;
}
.page-dot {
  background: transparent;
  border: 1px solid var(--orange);
  color: var(--orange);
  width: 38px; height: 38px;
  cursor: pointer;
  font-family: var(--EN);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: .08em;
  transition: background .2s, color .2s, transform .2s;
}
.page-dot.active,
.page-dot:hover { background: var(--orange); color: var(--dark); }
.page-dot.active { transform: translateY(-2px); }

/* Decorative divider — reference shows thin line with diamonds */
.proj-divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 32px auto 0;
  width: 360px;
  max-width: 90vw;
}
.proj-divider-line {
  flex: 1;
  height: 1px;
  background: linear-gradient(to right, transparent, var(--orange));
}
.proj-divider-line.r {
  background: linear-gradient(to left, transparent, var(--orange));
}
.proj-divider-gem {
  color: var(--orange);
  font-size: 9px;
  letter-spacing: 6px;
}

/* ============================
   MODS PAGE
============================ */
#page-mods {
  min-height: 100vh;
  padding-top: 54px;
  padding-bottom: 56px;
  background: var(--dark);
}

.mods-inner {
  padding: 20px 32px 48px;
}

.mods-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  max-width: 900px;
  margin: 0 auto;
}

.mod-card {
  background: var(--dark2);
  padding: 24px 20px;
  transition: background .2s;
}

/* ============================

============================ */
#page-track {

  background: var(--dark);

  align-items: center;
  justify-content: center;
  padding-bottom: 56px;
}

.track-box {
  width: 100%;
  max-width: 480px;
  padding: 0 24px;
}
.track-eyebrow {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .4em;
  color: var(--orange);
  text-transform: uppercase;
  margin-bottom: 8px;
}
.track-heading {
  font-size: 32px;
  font-weight: 900;
  letter-spacing: .1em;
  margin-bottom: 8px;
}
.track-sub {
  font-family: var(--TH);
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 28px;
  line-height: 1.6;
}

.track-field {
  width: 100%;
  background: var(--dark2);
  border: none;
  border-bottom: 1px solid var(--orange);
  color: var(--cream);
  font-family: var(--EN);
  font-size: 14px;
  padding: 12px 14px;
  outline: none;
  margin-bottom: 10px;
  display: block;
  transition: border-color .2s;
}
.track-field:focus { border-color: #e07840; }
.track-field::placeholder { color: var(--muted); font-family: var(--TH); }

.track-submit {
  width: 100%;
  margin-top: 8px;
  background: var(--orange);
  border: none;
  color: var(--dark);
  font-family: var(--EN);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .22em;
  text-transform: uppercase;
  padding: 14px;
  cursor: pointer;
  transition: background .2s;
}
.track-submit:hover { background: #d97030; }

.track-result {
  display: none;
  margin-top: 20px;
  border: 1px solid var(--border);
  background: var(--dark2);
  padding: 16px 18px;
}
.track-result.show { display: block; }
.track-result-label {
  font-size: 9px;
  letter-spacing: .28em;
  color: var(--orange);
  font-weight: 700;
  margin-bottom: 6px;
}
.track-result-text { font-size: 14px; font-weight: 600; }

/* ============================
   TRACK NUMBER MODAL OVERRIDE
============================ */
.track-modal-box {
  max-width: 460px !important;
  display: block !important;
  padding: 36px 28px 28px;
}
.track-modal-box .track-box {
  padding: 0;
  max-width: none;
}

/* ============================
   CHARACTER MODAL
============================ */
.modal-bg {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.88);

  align-items: center;
  justify-content: center;
  padding: 24px;
}
.modal-bg.open { display: flex; }

.modal-box {
  background: var(--dark2);

  width: 100%;
  max-width: 580px;
  display: flex;
  position: relative;
  overflow: hidden;
}
.modal-img-col {
  width: 180px;
  flex-shrink: 0;
  background: var(--dark);
  border-right: 1px solid var(--border);
}
.modal-img-col img {
  width: 100%;
  height: 340px;
  object-fit: cover;
  object-position: top;
  display: block;
}
.modal-body {
  flex: 1;
  padding: 22px 22px 18px;
  display: flex;
  flex-direction: column;
  min-width: 0;
}
.modal-roman {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .35em;
  color: var(--orange);
  margin-bottom: 4px;
}
.modal-name {
  font-size: 22px;
  font-weight: 900;
  letter-spacing: .04em;
  line-height: 1.15;
  margin-bottom: 2px;
}
.modal-thai {
  font-family: var(--TH);
  font-size: 14px;
  font-weight: 600;
  color: var(--cream);
}
.modal-en {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: .04em;
  margin-bottom: 10px;
}
.modal-hr {
  width: 28px; height: 1px;
  background: var(--orange);
  margin-bottom: 12px;
}
.modal-stats {
  display: grid;
  grid-template-columns: 1fr;
  gap: 5px;
  margin-bottom: 12px;
}
.modal-stats > div {
  display: flex;
  align-items: baseline;
  gap: 10px;
}
.modal-stats .k {
  display: inline-block;
  width: 44px;
  flex-shrink: 0;
  font-size: 8px;
  font-weight: 700;
  letter-spacing: .22em;
  color: var(--orange);
  text-transform: uppercase;
}
.modal-stats .v {
  font-family: var(--TH);
  font-size: 12px;
  color: var(--cream);
  line-height: 1.45;
}
.modal-player {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-top: auto;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}
.modal-player-line {
  font-family: var(--TH);
  font-size: 11px;
  color: var(--muted);
}
.modal-player-line strong {
  color: var(--cream);
  font-family: var(--EN);
  font-weight: 700;
  letter-spacing: .05em;
}
.modal-player-id {
  font-family: var(--EN);
  font-size: 10px;
  color: var(--muted);
}
.modal-player-yt {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  border: 1px solid var(--orange);
  color: var(--orange);
  padding: 7px 14px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .18em;
  text-decoration: none;
  text-transform: uppercase;

  width: fit-content;
}
.modal-player-yt:hover { background: var(--orange); color: var(--dark); }
.modal-player-yt svg {
  width: 10px;
  height: 10px;
  fill: currentColor;
  display: block;
}
.modal-tag {
  margin-top: 8px;
  font-size: 11px;
  color: var(--orange);
  letter-spacing: .04em;
}
.modal-close-btn {
  position: absolute;
  top: 10px; right: 10px;
  background: none; border: none;
  color: var(--muted);
  font-size: 16px;
  cursor: pointer;
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  transition: color .2s;

.modal-close-btn:hover { color: var(--cream); }

/* ============================

============================ */
#news-section {

}
.news-grid {

  flex-direction: column;
  gap: 14px;

  margin: 0 auto;
}
.news-row {
  display: grid;
  gap: 14px;

.news-row.r-2 { grid-template-columns: repeat(2, 1fr); }
.news-row.r-3 { grid-template-columns: repeat(3, 1fr); }

.news-item {
  position: relative;
  aspect-ratio: 16/9;
  background: var(--dark2);
  border: 1px solid var(--border);
  overflow: hidden;
  transition: border-color .25s, transform .25s;
}
.news-item:hover { border-color: var(--orange); transform: translateY(-3px); }

  width: 100%;
  height: 100%;
  border: 0;
  display: block;
}
.news-item-label {
  position: absolute;
  top: 10px;
  left: 12px;
  max-width: calc(100% - 24px);
  font-family: var(--EN);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .04em;
  color: var(--orange);
  background: rgba(0,0,0,.78);
  padding: 5px 10px;
  pointer-events: none;
  z-index: 2;
  line-height: 1.35;
}

.news-item.placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;

}
.news-item.placeholder .ph-label {
  font-family: var(--EN);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .25em;
  color: var(--muted);
  text-transform: uppercase;
}
.news-item.placeholder .ph-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  border: 1px solid var(--orange);
  color: var(--orange);
  padding: 8px 16px;
  font-family: var(--EN);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .2em;
  text-decoration: none;
  text-transform: uppercase;
  transition: background .2s, color .2s;
}
.news-item.placeholder .ph-link:hover {
  background: var(--orange);
  color: var(--dark);
}
.news-item.placeholder .ph-link svg {
  width: 10px;
  height: 10px;
  fill: currentColor;
  display: block;
}

/* ============================
   FOOTER
============================ */

  height: 130px;

  font-weight: 600;

  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 12px 24px;
  margin-bottom: 20px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: .18em;
  text-transform: uppercase;
}
.footer-links a {
  color: var(--dark);

/* ─────────────────────
   TABS
───────────────────── */
function toggleTab(id) {
  // NOW ON AIR label is locked to LUSTORIA HOTEL — tab clicks no longer change it.
  const btn = document.getElementById('tab-' + id);
  const wasActive = btn.classList.contains('active');
  document.querySelectorAll('.air-tab').forEach(t => t.classList.remove('active'));
  if (!wasActive) btn.classList.add('active');
}

/* ─────────────────────
   PROJECT DETAIL
───────────────────── */
let activeProject = null;
let activePage = 0;

function openProject(id, noScroll) {
  const proj = PROJECTS.find(p => p.id === id);
  if (!proj) return;
  const expand = document.getElementById('proj-expand');
  const inner  = expand.querySelector('.proj-expand-inner');

  // Clicking the currently-open project toggles it closed (skip on init).
  if (!noScroll && activeProject && activeProject.id === proj.id && expand.classList.contains('open')) {
    closeProject();
    return;
  }

  activeProject = proj;
  activePage = 0;

  // Highlight the active card.
  document.querySelectorAll('.proj-card').forEach(c => c.classList.remove('active'));
  document.getElementById('proj-card-' + proj.id)?.classList.add('active');

  // Populate header (no-bg logo with text fallback).
  const logoEl = document.getElementById('d-logo');
  const titleLogo = proj.logoTitle || proj.logo;
  if (titleLogo) {
    logoEl.src = titleLogo;
    logoEl.style.display = '';
    document.getElementById('d-eyebrow').textContent = '';
    document.getElementById('d-title').textContent = '';
  } else {
    logoEl.removeAttribute('src');
    logoEl.style.display = 'none';
    document.getElementById('d-eyebrow').textContent = `— PROJECT ${proj.num} —`;
    document.getElementById('d-title').textContent = proj.name;
  }
  document.getElementById('d-sub').textContent = proj.subtitle || '';

  buildCharGrid(proj, activePage);
  buildPagination(proj);

  expand.classList.add('open');

  // Re-trigger the inner slide-in animation on every open/switch.
  inner.classList.remove('slide-in');
  void inner.offsetWidth;
  inner.classList.add('slide-in');

  if (!noScroll) {
    setTimeout(() => {
      const headerH = document.getElementById('header')?.offsetHeight || 54;
      const top = expand.getBoundingClientRect().top + window.scrollY - headerH - 8;
      window.scrollTo({ top, behavior: 'smooth' });
    }, 80);
  }
}

function closeProject() {
  const expand = document.getElementById('proj-expand');
  expand.classList.remove('open');
  activeProject = null;
  document.querySelectorAll('.proj-card').forEach(c => c.classList.remove('active'));
}

function buildCharGrid(proj, page) {
  const PER_ROW = 8;
  const rows = proj.rows || 3;
  const perPage = PER_ROW * rows;
  const offset = (page || 0) * perPage;

  let html = '';
  for (let r = 0; r < rows; r++) {
    html += '<div class="char-row">';
    for (let c = 0; c < PER_ROW; c++) {
      const localIdx = r * PER_ROW + c;
      const globalIdx = offset + localIdx;
      const ch = proj.chars[globalIdx];
      if (ch) {
        html += `<div class="c-card" onclick="openChar(${globalIdx})">
          <img src="${ch.img}" alt="${ch.name}" onerror="this.style.display='none'">
        </div>`;
      } else {
        html += `<div class="c-card empty"></div>`;
      }
    }
    html += '</div>';
  }
  document.getElementById('char-section').innerHTML = html;
}

function buildPagination(proj) {
  const el = document.getElementById('char-pagination');
  const pages = proj.pages || 1;
  if (pages <= 1) { el.innerHTML = ''; return; }
  let html = '';
  for (let i = 0; i < pages; i++) {
    html += `<button class="page-dot ${i === activePage ? 'active' : ''}" onclick="setProjPage(${i})">${String(i+1).padStart(2,'0')}</button>`;
  }
  el.innerHTML = html;
}

function setProjPage(p) {
  if (!activeProject) return;
  activePage = p;
  buildCharGrid(activeProject, activePage);
  buildPagination(activeProject);
}

/* ─────────────────────
   CHARACTER MODAL
───────────────────── */
function openChar(idx) {
  if (!activeProject) return;
  const ch = activeProject.chars[idx];
  if (!ch) return;

  const img = document.getElementById('m-img');
  img.style.display = '';
  img.src = ch.img || '';

  document.getElementById('m-roman').textContent = ch.roman ? `CARD ${ch.roman}` : '';
  document.getElementById('m-name').textContent  = ch.name  || '';
  document.getElementById('m-thai').textContent  = ch.thai  && ch.thai !== '-' ? ch.thai : '';
  document.getElementById('m-en').textContent    = ch.en    && ch.en   !== '-' ? ch.en   : '';

  const show = v => v !== undefined && v !== null && v !== '' && v !== '-';
  const stats = [];
  if (show(ch.age))        stats.push(['Age',  ch.age]);
  if (show(ch.role))       stats.push(['Role', ch.role]);
  if (show(ch.profession)) stats.push(['Job',  ch.profession]);
  if (show(ch.head))       stats.push(['Head', ch.head]);
  if (show(ch.sin))        stats.push(['Sin',  ch.sin]);
  document.getElementById('m-stats').innerHTML = stats.map(([k,v]) =>
    `<div><span class="k">${k}</span><span class="v">${v}</span></div>`
  ).join('');

  let player = '';
  const channel = show(ch.ytName) ? ch.ytName : (show(ch.player) ? ch.player : '');
  if (channel) {
    player += `<div class="modal-player-line">โดย <strong>${channel}</strong></div>`;
  }
  if (ch.yt) {
    player += `<a class="modal-player-yt" href="${ch.yt}" target="_blank" rel="noopener"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M8 5v14l11-7z"/></svg>YouTube</a>`;
  }
  document.getElementById('m-player').innerHTML = player;
  document.getElementById('m-tag').textContent = ch.tag || '';

  document.getElementById('char-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('char-modal').classList.remove('open');
}

function modalBgClick(e) {
  if (e.target === document.getElementById('char-modal')) closeModal();

/* ─────────────────────
   MUSIC PLAYER
───────────────────── */
const TRACKS = [
  { title: 'GOAL SET! instrumental',      src: 'song/METALS.mp3' },
  { title: 'DEATH ILLUSION instrumental', src: 'song/EX_LUSTORIA(MT).mp3' }
];
let trackIdx = 0;

const SVG_PLAY   = '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M8 5v14l11-7z"/></svg>';
const SVG_PAUSE  = '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M6 4h4v16H6zM14 4h4v16h-4z"/></svg>';
const SVG_VOL_HI = '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>';
const SVG_VOL_LO = '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M7 9v6h4l5 5V4l-5 5H7z"/></svg>';
const SVG_VOL_MUTE = '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zM4.27 3 3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73 4.27 3z"/></svg>';

function loadTrack(i, autoplay) {
  const n = TRACKS.length;
  trackIdx = ((i % n) + n) % n;
  const audio = document.getElementById('mp-audio');
  audio.src = TRACKS[trackIdx].src;
  document.getElementById('mp-title').textContent = TRACKS[trackIdx].title;
  if (autoplay) audio.play().catch(() => {});
}

function togglePlay() {
  const audio = document.getElementById('mp-audio');
  if (audio.paused) {
    audio.play().catch(() => {});
  } else {
    audio.pause();
  }
}

function nextTrack() { loadTrack(trackIdx + 1, true); }
function prevTrack() { loadTrack(trackIdx - 1, true); }
function hidePlayer() {
  document.getElementById('mp-audio').pause();
  document.getElementById('music-player').classList.add('hidden');
}

function applyVolume(v) {
  const audio = document.getElementById('mp-audio');
  const icon  = document.getElementById('mp-vol-icon');
  const value = document.getElementById('mp-vol-value');
  const vol   = Math.max(0, Math.min(100, +v));
  audio.volume = vol / 100;
  icon.innerHTML = vol === 0 ? SVG_VOL_MUTE : (vol < 50 ? SVG_VOL_LO : SVG_VOL_HI);
  value.textContent = vol;
  try { localStorage.setItem('mp-vol', vol); } catch (e) {}
}

function toggleMute() {
  const slider = document.getElementById('mp-vol-slider');
  if (+slider.value > 0) {
    slider.dataset.prev = slider.value;
    slider.value = 0;
  } else {
    slider.value = slider.dataset.prev || 50;
  }
  applyVolume(slider.value);
}

(function initPlayer() {
  const audio = document.getElementById('mp-audio');
  const playBtn = document.getElementById('mp-play');
  const volSlider = document.getElementById('mp-vol-slider');

  loadTrack(0, false);

  // Restore saved volume (default 50%).
  let savedVol = 50;
  try { const s = localStorage.getItem('mp-vol'); if (s !== null) savedVol = +s; } catch (e) {}
  volSlider.value = savedVol;
  applyVolume(savedVol);

  volSlider.addEventListener('input', e => applyVolume(e.target.value));

  audio.addEventListener('play',  () => { playBtn.innerHTML = SVG_PAUSE; });
  audio.addEventListener('pause', () => { playBtn.innerHTML = SVG_PLAY; });
  audio.addEventListener('ended', () => { loadTrack(trackIdx + 1, true); });

  // Try autoplay; browsers usually block it. Fall back to starting on the
  // user's first interaction with the page.
  audio.play().catch(() => {
    const kick = () => {
      audio.play().catch(() => {});
      window.removeEventListener('click',   kick, true);
      window.removeEventListener('keydown', kick, true);
      window.removeEventListener('touchstart', kick, true);
    };
    window.addEventListener('click',   kick, true);
    window.addEventListener('keydown', kick, true);
    window.addEventListener('touchstart', kick, true);
  });
})();

   INIT
───────────────────── */
renderProjects();
renderNews();
renderTeam();
renderTabs();
renderMods();

// Auto-open the on-air project (Lustoria) so its character grid is visible on load.
openProject('lustoria', true);
